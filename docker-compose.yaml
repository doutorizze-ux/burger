version: '3.8'

services:
  pitdog:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - pitdog_data:/app/server/data
      - pitdog_sessions:/app/server/sessions
      - pitdog_uploads:/app/server/uploads
    environment:
      - DATABASE_URL=file:/app/server/data/database.sqlite
      - TZ=America/Sao_Paulo
      - PORT=3000
      - ASAAS_ENV=sandbox
      - JWT_SECRET=pitdog_secret_key_123

volumes:
  pitdog_data:
  pitdog_sessions:
  pitdog_uploads:
